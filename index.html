<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Hồng Lâu Mộng - Hệ Thống Tổng Lực</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* --- GIAO DIỆN TỐI SANG TRỌNG --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #080808; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; padding: 40px 20px; color: #ffffff; 
            box-sizing: border-box; overflow: hidden; position: relative; 
        }

        .profile-card {
            width: 100%; max-width: 380px; text-align: center;
            background: rgba(20, 20, 20, 0.8); 
            padding: 40px 25px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .avatar-container {
            width: 115px; height: 115px; margin: 0 auto 20px auto;
            border-radius: 50%; overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 0 25px rgba(208, 29, 90, 0.6);
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        .name-wrapper {
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        .name-wrapper h1 { 
            font-size: 22px; font-weight: 900; margin: 0; 
            background: linear-gradient(to right, #fff, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .verified-badge { width: 20px; height: 20px; margin-left: 8px; fill: #1DA1F2; }

        .bio { font-size: 14px; color: #aaa; margin-bottom: 30px; font-style: italic; }

        .links-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        
        .link-item {
            text-decoration: none; padding: 16px; border-radius: 18px;
            font-weight: 700; font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            color: #fff; animation: gentleShake 3.5s infinite;
        }
        
        /* Nút 1: VÀO NHÓM (Hồng) */
        .btn-main {
            background: linear-gradient(135deg, #ff69b4, #d01d5a);
            box-shadow: 0 8px 20px rgba(208, 29, 90, 0.4);
        }

        /* Nút 2: DỰ PHÒNG (Vàng) */
        .btn-yellow {
            background: #f39c12; color: #fff;
            box-shadow: 0 8px 15px rgba(243, 156, 18, 0.3);
            animation-delay: 0.2s;
        }

        /* Nút 3: ADMIN (Đỏ) */
        .btn-red {
            background: #c0392b;
            box-shadow: 0 8px 15px rgba(192, 57, 43, 0.3);
            animation-delay: 0.4s;
        }

        .link-item:hover { 
            transform: translateY(-5px) scale(1.02);
            filter: brightness(1.2); 
            animation-play-state: paused;
        }

        @keyframes gentleShake {
            0%, 70%, 100% { transform: rotate(0deg); }
            72%, 76%, 80%, 84%, 88%, 92%, 96% { transform: rotate(-1.5deg); }
            74%, 78%, 82%, 86%, 90%, 94%, 98% { transform: rotate(1.5deg); }
        }

        .guide-box { 
            margin-top: 30px; padding: 18px; 
            border: 1px dashed rgba(255, 182, 193, 0.5);
            border-radius: 20px; background: rgba(255, 255, 255, 0.05); text-align: left;
        }
        .guide-box h4 { color: #ff69b4; margin: 0 0 10px 0; font-size: 16px; text-align: center; text-transform: uppercase; }
        .guide-box p { font-size: 13px; line-height: 1.6; margin: 6px 0; color: #ccc; }
        .highlight { color: #ff69b4; font-weight: bold; }

        .cherry-blossom { 
            position: absolute; background-color: #ffb6c1; border-radius: 50% 0 50% 50%; 
            opacity: 0.6; pointer-events: none; animation: fall linear infinite; z-index: 1; 
        }
        @keyframes fall {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg); opacity: 0.8; }
            50% { transform: translateY(50vh) translateX(50px) rotate(180deg); opacity: 0.6; }
            100% { transform: translateY(105vh) translateX(-20px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img src="https://i.ibb.co/TBvfCzZ6/H-nh-nh.jpg" alt="Hồng Lâu Mộng">
        </div>

        <div class="name-wrapper">
            <h1>HỒNG LÂU MỘNG</h1>
            <svg class="verified-badge" viewBox="0 0 512 512">
                <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm113-281l-128 128c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47 111-111c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z"/>
            </svg>
        </div>
        
        <p class="bio">Hệ thống đang tự động kết nối...</p>

        <div class="links-group">
            <a href="https://t.me/Tramgiaitri" class="link-item btn-main">VÀO NHÓM TELEGRAM NGAY</a>
            <a href="https://t.me/+UdgDXaHXRmY2Y2I1" class="link-item btn-yellow">KÊNH DỰ PHÒNG</a>
            <a href="https://t.me/HotroHonglaumong_bot" class="link-item btn-red">LIÊN HỆ QUẢN TRỊ VIÊN</a>
        </div>

        <div class="guide-box">
            <h4>Nếu không vào được:</h4>
            <p>1. Nhấn vào <span class="highlight">Dấu 3 Chấm (...)</span> góc trên.</p>
            <p>2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span> (Safari/Chrome).</p>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://t.me/Tramgiaitri";
            }, 2000);
        }

        function createBlossom() {
            if (document.querySelectorAll('.cherry-blossom').length > 20) return;
            const blossom = document.createElement('div');
            blossom.className = 'cherry-blossom';
            const size = Math.random() * 8 + 5 + 'px';
            blossom.style.width = size; blossom.style.height = size;
            blossom.style.left = Math.random() * 100 + 'vw';
            blossom.style.animationDuration = Math.random() * 4 + 4 + 's'; 
            document.body.appendChild(blossom);
            setTimeout(() => { blossom.remove(); }, 8000);
        }
        setInterval(createBlossom, 500);
    </script>
</body>
</html>
