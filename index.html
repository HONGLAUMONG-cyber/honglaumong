<!DOCTYPE html>
<html lang="vi">
<head>
    <title>TRANG CHỦ HỒNG LÂU MỘNG</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Giao diện nền nhã nhặn, tập trung vào nội dung chính */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; color: #333; padding: 20px; 
            box-sizing: border-box; overflow-x: hidden;
        }
        .container { 
            text-align: center; width: 100%; max-width: 400px; background: #ffffff; 
            padding: 40px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            margin-top: 80px; position: relative; border: 1px solid #eee;
        }
        
        /* Ảnh đại diện lấy từ file bạn cung cấp */
        .avatar-wrapper {
            width: 120px; height: 120px; margin: -90px auto 15px auto;
            border-radius: 50%; border: 5px solid white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden; background-color: #eee;
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Tiêu đề in hoa có tích xanh xác minh */
        .verified-title {
            display: flex; align-items: center; justify-content: center; margin: 10px 0;
        }
        h2 { 
            margin: 0; color: #333; font-size: 18px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .badge-icon { width: 18px; height: 18px; margin-left: 5px; flex-shrink: 0; }

        /* Nút bấm nổi bật */
        .btn { 
            display: block; padding: 16px 20px; color: white; text-decoration: none; 
            border-radius: 12px; font-weight: bold; font-size: 17px; margin-top: 20px;
            background: #0088cc; /* Màu đặc trưng Telegram */
            transition: 0.3s; box-shadow: 0 4px 12px rgba(0,136,204,0.3);
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        
        /* Box hướng dẫn chuẩn mẫu bạn thích */
        .guide-box { 
            margin-top: 30px; padding: 15px; 
            border: 2px dashed #ffb6c1; 
            border-radius: 16px; 
            background-color: #fff9fa; 
        }
        .guide-box h4 { color: #d01d5a; margin: 0 0 10px 0; font-size: 16px; }
        .guide-box p { font-size: 14px; line-height: 1.5; margin: 8px 0; color: #555; text-align: left; }
        .highlight { color: #d01d5a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="https://i.ibb.co/TBvfCzZ6/H-nh-nh.jpg" alt="Avatar" class="avatar">
        </div>

        <div class="verified-title">
            <h2>TRANG CHỦ HỒNG LÂU MỘNG</h2>
            <svg class="badge-icon" viewBox="0 0 512 512">
                <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm113-281l-128 128c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47 111-111c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z" fill="#1DA1F2"/>
            </svg>
        </div>
        
        <p style="color: #777; font-size: 13px;">Hệ thống đang kết nối an toàn...</p>
        
        <a href="tg://join?invite=y_YIIePa7tw3NDM1" class="btn">MỞ TRONG TELEGRAM</a>

        <div class="guide-box">
            <h4>Nếu kết nối thất bại:</h4>
            <p>1. Nhấn vào biểu tượng <span class="highlight">Dấu 3 Chấm (...)</span></p>
            <p>2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span></p>
        </div>
    </div>

    <script>
        /* TỰ ĐỘNG MỞ TELEGRAM NGAY LẬP TỨC */
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "tg://join?invite=y_YIIePa7tw3NDM1";
            }, 1200); // Sau 1.2 giây sẽ tự động kích hoạt
        };
    </script>
</body>
</html>
