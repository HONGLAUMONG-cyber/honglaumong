<!DOCTYPE html>
<html>
<head>
    <title>Hồng Lâu Mộng - Kết nối Telegram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Giao diện chính */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; background-color: #fff0f5; color: #333; padding: 20px; box-sizing: border-box; overflow-x: hidden; position: relative; }
        .container { text-align: center; width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3); margin-top: 50px; position: relative; z-index: 10; border: 2px solid #ffb6c1; }
        h2 { margin: 0; color: #d01d5a; font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif; font-size: 28px; }
        .btn { display: inline-block; padding: 18px 36px; background-color: #ff69b4; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 20px; margin-top: 25px; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); border: none; cursor: pointer; }
        .btn:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(255, 105, 180, 0.3); }
        .guide-box { margin-top: 40px; padding: 20px; border: 2px dashed #d01d5a; border-radius: 15px; background-color: #fff; position: relative; z-index: 10; }
        .guide-box h4 { color: #d01d5a; margin-top: 0; font-size: 18px; }
        .guide-box p { font-size: 14px; line-height: 1.6; text-align: left; margin: 5px 0; color: #555; }
        .highlight { color: #d01d5a; font-weight: bold; }
        .arrow { font-size: 24px; color: #d01d5a; margin-top: 15px; display: inline-block; }

        /* Hiệu ứng Hoa Anh Đào Rơi */
        .cherry-blossom { position: absolute; background-color: #ffb6c1; border-radius: 50%; opacity: 0.8; pointer-events: none; animation-name: fall; animation-timing-function: linear; animation-iteration-count: infinite; z-index: 1; }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Hồng Lâu Mộng</h2>
        <p style="margin-top: 10px; color: #666; font-size: 14px;">Mở Telegram để vào nhóm kín...</p>
        
        <a href="tg://join?invite=y_YIIePa7tw3NDM1" class="btn">MỞ TRONG TELEGRAM</a>

        <div class="guide-box">
            <h4>Nếu bấm nút vẫn không được?</h4>
            <p>Do TikTok chặn, hãy làm 2 bước:</p>
            <p>1. Nhấn vào <span class="highlight">Dấu 3 Chấm (...)</span> ở góc trên bên phải màn hình.</p>
            <p>2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span> (Safari/Chrome).</p>
            <p>App Telegram sẽ tự bật lên ngay!</p>
            <div class="arrow">↓ ↓ ↓</div>
        </div>
    </div>

    <script>
        // Tự động nhảy link sau 0.5 giây
        setTimeout(function() {
            // Thay link tg:// bằng mã invite chính xác của bạn
            window.location.href = "tg://join?invite=y_YIIePa7tw3NDM1";
        }, 500);

        // Script tạo hoa anh đào rơi
        function createBlossom() {
            const container = document.body;
            const blossom = document.createElement('div');
            blossom.className = 'cherry-blossom';
            
            // Kích thước ngẫu nhiên
            const size = Math.random() * 10 + 5 + 'px';
            blossom.style.width = size;
            blossom.style.height = size;
            
            // Vị trí ngang ngẫu nhiên
            blossom.style.left = Math.random() * 100 + 'vw';
            
            // Thời gian rơi ngẫu nhiên
            blossom.style.animationDuration = Math.random() * 3 + 2 + 's'; 
            
            // Độ mờ ngẫu nhiên
            blossom.style.opacity = Math.random() * 0.5 + 0.3;

        container.appendChild(blossom);

            // Xóa hoa sau khi rơi xong để tránh nặng máy
            setTimeout(() => {
                blossom.remove();
            }, 5000);
        }

        // Tạo hoa mới mỗi 200ms
        setInterval(createBlossom, 200);
    </script>
</body>
</html>
