<!DOCTYPE html>
<html>
<head>
    <title>Kết nối Telegram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { text-align: center; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 400px; }
        .btn { display: block; padding: 18px; background-color: #24A1DE; color: white; text-decoration: none; border-radius: 15px; font-weight: bold; font-size: 20px; margin-top: 20px; }
        h2 { color: #222; margin: 0 0 10px 0; }
        p { color: #666; font-size: 15px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Hồng Lâu Mộng</h2>
        <p>Nếu không tự động chuyển hướng, vui lòng nhấn nút bên dưới:</p>
        
        <a href="https://t.me/+y_YIIePa7tw3NDM1" class="btn">VÀO NHÓM NGAY</a>
        
        <p style="margin-top: 15px; font-size: 12px; color: #999;">Gợi ý: Nếu vẫn lỗi, hãy chọn "Mở bằng trình duyệt hệ thống" ở dấu 3 chấm góc trên.</p>
    </div>

    <script>
        // Tự động nhảy bằng link web thay vì link app để tránh bị trình duyệt chặn
        setTimeout(function() {
            window.location.href = "https://t.me/+y_YIIePa7tw3NDM1";
        }, 1000);
    </script>
</body>
</html>
