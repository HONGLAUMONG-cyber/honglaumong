<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Hồng Lâu Mộng - Hệ Thống Tổng Lực</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* --- GIAO DIỆN TỐI SANG TRỌNG --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f0f0f; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; padding: 40px 20px; color: #ffffff; 
            box-sizing: border-box; overflow-x: hidden; position: relative; 
        }

        /* Khung chứa chính */
        .profile-card {
            width: 100%; max-width: 400px; text-align: center;
            background: rgba(25, 25, 25, 0.9); 
            padding: 40px 25px; border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
        }

        /* Avatar */
        .avatar-container {
            width: 110px; height: 110px; margin: 0 auto 15px auto;
            border-radius: 50%; overflow: hidden;
            border: 4px solid #fff; 
            box-shadow: 0 8px 25px rgba(208, 29, 90, 0.4);
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Tiêu đề & Tích xanh */
        .name-wrapper {
            display: flex; align-items: center; justify-content: center; margin-bottom: 5px;
        }
        .name-wrapper h1 { 
            font-size: 20px; font-weight: 800; margin: 0; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .verified-badge {
            width: 22px; height: 22px; margin-left: 6px;
            fill: #1DA1F2;
        }

        .bio { font-size: 13px; color: #888; margin-bottom: 25px; }

        /* Nhóm nút bấm */
        .links-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        
        .link-item {
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }
        
        /* Nút VÀO NHÓM (Hồng - Gradient) */
        .btn-main {
            background: linear-gradient(135deg, #ff69b4, #d01d5a);
            box-shadow: 0 6px 20px rgba(208, 29, 90, 0.4);
            animation: gentleShake 3s infinite;
        }

        /* Nút KÊNH DỰ PHÒNG (Vàng) */
        .btn-yellow {
            background: #f1c40f;
            color: #000;
            box-shadow: 0 6px 15px rgba(241, 196, 15, 0.3);
        }

        /* Nút LIÊN HỆ ADMIN (Đỏ) */
        .btn-red {
            background: #e74c3c;
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.3);
        }

        .link-item:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); }

        @keyframes gentleShake {
            0%, 80%, 100% { transform: rotate(0deg); }
            82%, 86%, 90%, 94% { transform: rotate(-1.5deg); }
            84%, 88%, 92%, 96% { transform: rotate(1.5deg); }
        }

        /* Box hướng dẫn chuẩn */
        .guide-box { 
            margin-top: 35px; padding: 20px; 
            border: 2px dashed #ffb6c1;
            border-radius: 20px; 
            background-color: #fff; 
            text-align: left;
        }
        .guide-box h4 { color: #d01d5a; margin: 0 0 10px 0; font-size: 17px; text-align: center; }
        .guide-box p { font-size: 14px; line-height: 1.6; margin: 8px 0; color: #333; }
        .highlight { color: #d01d5a; font-weight: bold; }

        /* --- HIỆU ỨNG HOA ĐÀO --- */
        .cherry-blossom { position: absolute; background-color: #ffb6c1; border-radius: 50%; opacity: 0.8; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img src="https://i.ibb.co/TBvfCzZ6/H-nh-nh.jpg" alt="Avatar">
        </div>

        <div class="name-wrapper">
            <h1>HỒNG LÂU MỘNG</h1>
            <svg class="verified-badge" viewBox="0 0 512 512">
                <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm113-281l-128 128c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47 111-111c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z"/>
            </svg>
        </div>
        
        <p class="bio">Hệ thống đang tự động kết nối...</p>

        <div class="links-group">
            <a href="tg://join?invite=y_YIIePa7tw3NDM1" class="link-item btn-main">VÀO NHÓM TELEGRAM NGAY</a>
            
            <a href="https://t.me/+4VFPp2IZHyM5Nzc1" class="link-item btn-yellow">KÊNH DỰ PHÒNG</a>
            
            <a href="https://t.me/Beshanday" class="link-item btn-red">LIÊN HỆ QUẢN TRỊ VIÊN</a>
        </div>

        <div class="guide-box">
            <h4>Nếu kết nối thất bại:</h4>
            <p>1. Nhấn vào biểu tượng <span class="highlight">Dấu 3 Chấm (...)</span></p>
            <p>2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span></p>
        </div>
    </div>

    <script>
        /* Tự động nhảy link sau 1.5 giây */
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "tg://join?invite=y_YIIePa7tw3NDM1";
            }, 1500);
        }

        /* Hiệu ứng hoa đào */
        function createBlossom() {
            if (document.querySelectorAll('.cherry-blossom').length > 15) return;
            const blossom = document.createElement('div');
            blossom.className = 'cherry-blossom';
            const size = Math.random() * 7 + 4 + 'px';
            blossom.style.width = size; blossom.style.height = size;
            blossom.style.left = Math.random() * 100 + 'vw';
            blossom.style.animationDuration = Math.random() * 3 + 4 + 's'; 
            document.body.appendChild(blossom);
            setTimeout(() => { blossom.remove(); }, 6000);
        }
        setInterval(createBlossom, 600);
    </script>
</body>
</html>
