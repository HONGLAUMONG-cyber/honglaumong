<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Trang Chủ Hồng Lâu Mộng - Kết nối Telegram</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* CSS Giao diện chung */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; background-color: #fff0f5; color: #333; padding: 20px; 
            box-sizing: border-box; overflow-x: hidden; position: relative; 
        }
        .container { 
            text-align: center; width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.95); 
            padding: 40px 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); 
            margin-top: 90px; position: relative; z-index: 10; border: 1px solid rgba(255, 182, 193, 0.5);
        }
        
        /* CSS Ảnh đại diện */
        .avatar-wrapper {
            width: 140px; height: 140px; margin: -105px auto 10px auto; position: relative;
        }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 6px solid white; box-shadow: 0 8px 25px rgba(208, 29, 90, 0.25);
        }
        
        /* CSS Tiêu đề với tích xanh */
        .verified-title {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0 10px 0;
            padding: 0 10px;
        }
        h2 { 
            margin: 0; 
            color: #d01d5a; 
            font-size: 20px; /* Chỉnh cỡ chữ vừa phải khi in hoa */
            font-weight: 800; /* In đậm */
            text-transform: uppercase; /* In hoa hoàn toàn */
            letter-spacing: 0.5px; /* Giãn chữ nhẹ */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* Font hiện đại */
        }
        .badge {
            display: inline-flex;
            width: 20px;
            height: 20px;
            margin-left: 8px; /* Khoảng cách chữ và tích */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm113-281l-128 128c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47 111-111c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z" fill="%231DA1F2"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        /* CSS Nút bấm */
        .btn { 
            display: inline-block; padding: 18px 50px; 
            background: linear-gradient(135deg, #ff69b4, #d01d5a); 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: bold; font-size: 21px; margin-top: 30px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 8px 25px rgba(208, 29, 90, 0.45); border: none; cursor: pointer;
            animation: gentleShake 3s infinite;
        }
        .btn:hover { transform: translateY(-5px) scale(1.04); background: linear-gradient(135deg, #ff85c2, #e02a6b); }
        .btn:active { transform: scale(0.96); }
        
        @keyframes gentleShake {
            0%, 80%, 100% { transform: rotate(0deg); }
            82%, 86%, 90%, 94% { transform: rotate(-1.5deg); }
            84%, 88%, 92%, 96% { transform: rotate(1.5deg); }
        }

        /* CSS Box hướng dẫn */
        .guide-box { margin-top: 40px; padding: 20px; border: 2px dashed #ffb6c1; border-radius: 15px; background-color: #fff9fa; }
        .guide-box h4 { color: #d01d5a; margin: 0 0 12px 0; font-size: 16px; font-weight: 700; }
        .guide-box p { font-size: 14px; line-height: 1.6; margin: 6px 0; color: #666; text-align: left; }
        .highlight { color: #d01d5a; font-weight: bold; }

        /* CSS Hoa rơi */
        .cherry-blossom { position: absolute; background-color: #ffb6c1; border-radius: 50%; opacity: 0.8; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="https://i.ibb.co/TBvfCzZ6/H-nh-nh.jpg" alt="Avatar" class="avatar">
        </div>

        <div class="verified-title">
            <h2>TRANG CHỦ HỒNG LÂU MỘNG</h2>
            <span class="badge" title="Đã xác minh"></span>
        </div>
        
        <p style="color: #888; font-size: 13px; margin: 0 0 25px 0; font-style: italic;">Bạn đang được chuyển hướng an toàn tới Telegram...</p>
        
        <a href="tg://join?invite=y_YIIePa7tw3NDM1" class="btn">VÀO NHÓM NGAY</a>

        <div class="guide-box">
            <h4>Nếu kết nối thất bại:</h4>
            <p>1. Nhấn vào biểu tượng <span class="highlight">Dấu 3 Chấm (...)</span></p>
            <p>2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span></p>
        </div>
    </div>

    <script>
        // Tự động mở Telegram sau 1.5 giây
        setTimeout(function() {
            window.location.href = "tg://join?invite=y_YIIePa7tw3NDM1";
        }, 1500);

        // Hiệu ứng hoa rơi
        function createBlossom() {
            if (document.querySelectorAll('.cherry-blossom').length > 25) return;
            const blossom = document.createElement('div');
            blossom.className = 'cherry-blossom';
            const size = Math.random() * 7 + 4 + 'px';
            blossom.style.width = size; blossom.style.height = size;
            blossom.style.left = Math.random() * 100 + 'vw';
            blossom.style.animationDuration = Math.random() * 3 + 3 + 's'; 
            document.body.appendChild(blossom);
            setTimeout(() => { blossom.remove(); }, 6000);
        }
        setInterval(createBlossom, 450);
    </script>
</body>
</html>
