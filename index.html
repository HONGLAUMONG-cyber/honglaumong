<!DOCTYPE html>
<html lang="vi">
<head>
    <title>TRANG CHỦ HỒNG LÂU MỘNG</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; background-color: #fff0f5; color: #333; padding: 20px; 
            box-sizing: border-box; overflow-x: hidden; position: relative; 
        }
        .container { 
            text-align: center; width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.95); 
            padding: 40px 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4); 
            margin-top: 90px; position: relative; z-index: 10; border: 1px solid rgba(255, 182, 193, 0.5);
        }
        
        /* Ảnh đại diện */
        .avatar-wrapper {
            width: 130px; height: 130px; margin: -100px auto 10px auto;
            border-radius: 50%; border: 6px solid white; 
            box-shadow: 0 8px 25px rgba(208, 29, 90, 0.25);
            overflow: hidden; background-color: #f0f0f0;
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* Tiêu đề & Tích xanh */
        .verified-title {
            display: flex; align-items: center; justify-content: center; margin: 15px 0 10px 0;
        }
        h2 { 
            margin: 0; color: #d01d5a; font-size: 19px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .badge-icon { width: 20px; height: 20px; margin-left: 6px; flex-shrink: 0; }

        /* Nút bấm */
        .btn { 
            display: block; padding: 18px 20px; color: white; text-decoration: none; 
            border-radius: 50px; font-weight: bold; font-size: 19px; margin-top: 25px;
            transition: all 0.3s ease; border: none; cursor: pointer;
            background: linear-gradient(135deg, #ff69b4, #d01d5a); 
            box-shadow: 0 6px 15px rgba(208, 29, 90, 0.3);
            animation: gentleShake 3s infinite;
        }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
        
        @keyframes gentleShake {
            0%, 80%, 100% { transform: rotate(0deg); }
            82%, 86%, 90%, 94% { transform: rotate(-2deg); }
            84%, 88%, 92%, 96% { transform: rotate(2deg); }
        }

        /* Box hướng dẫn chuẩn của bạn */
        .guide-box { 
            margin-top: 35px; padding: 20px; 
            border: 2px dashed #ffb6c1; 
            border-radius: 20px; 
            background-color: #ffffff; 
        }
        .guide-box h4 { color: #d01d5a; margin: 0 0 15px 0; font-size: 18px; font-weight: bold; }
        .guide-box p { font-size: 15px; line-height: 1.6; margin: 10px 0; color: #333; text-align: left; }
        .highlight { color: #d01d5a; font-weight: bold; }

        /* Hoa rơi */
        .cherry-blossom { position: absolute; background-color: #ffb6c1; border-radius: 50%; opacity: 0.8; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="https://i.ibb.co/TBvfCzZ6/H-nh-nh.jpg" alt="Avatar" class="avatar">
        </div>

        <div class="verified-title">
            <h2>TRANG CHỦ HỒNG LÂU MỘNG</h2>
            <svg class="badge-icon" viewBox="0 0 512 512">
                <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm113-281l-128 128c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47 111-111c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z" fill="#1DA1F2"/>
            </svg>
        </div>
        
        <p style="color: #888; font-size: 13px; margin-bottom: 5px;">Đang kết nối tới Telegram...</p>
        
        <a href="tg://join?invite=y_YIIePa7tw3NDM1" class="btn">VÀO NHÓM NGAY</a>

        <div class="guide-box">
            <h4>Nếu kết nối thất bại:</h4>
            <p>1. Nhấn vào biểu tượng <span class="highlight">Dấu 3 Chấm (...)</span></p>
            <p>2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span></p>
        </div>
    </div>

    <script>
        /* ĐÂY LÀ DÒNG LỆNH TỰ ĐỘNG VÀO NHÓM */
        setTimeout(function() {
            window.location.href = "tg://join?invite=y_YIIePa7tw3NDM1";
        }, 1500); // Sau 1.5 giây sẽ tự nhảy vào Telegram

        // Hiệu ứng hoa rơi
        function createBlossom() {
            if (document.querySelectorAll('.cherry-blossom').length > 15) return;
            const blossom = document.createElement('div');
            blossom.className = 'cherry-blossom';
            const size = Math.random() * 7 + 4 + 'px';
            blossom.style.width = size; blossom.style.height = size;
            blossom.style.left = Math.random() * 100 + 'vw';
            blossom.style.animationDuration = Math.random() * 3 + 4 + 's'; 
            document.body.appendChild(blossom);
            setTimeout(() => { blossom.remove(); }, 6000);
        }
        setInterval(createBlossom, 600);
    </script>
</body>
</html>
